rule_groups:
  off_platform_contact:
    description: 导流、私下交易和联系方式规则。
    keywords:
      - 微信
      - 微 信
      - 加微
      - VX
      - vx
      - WX
      - wx
      - 加V
      - 加 V
      - V信
      - v信
      - 薇信
      - 加我
      - 私聊
      - 私信
      - 线下交易
      - 站外
      - 号码联系
      - 团购V
    regex:
      - "(?<!\\d)1[3-9]\\d{9}(?!\\d)"
      - "[A-Za-z0-9_\\-]{5,20}\\s*(微信|VX|vx|V信|v信)"
    exclude_keywords:
      - 微信读书
      - 企业微信
      - 官方微信
      - 微信支付
      - 联系客服领取安装视频
    exclude_regex:
      - "不(支持|引导|接受)?站外交易"

  prohibited_goods:
    description: 违禁商品和高风险商品词。
    keywords:
      - 电子烟
      - 雾化器
      - vape
      - VAPE
      - 管制刀具
      - 折叠刀
      - 弹簧刀
      - 弹簧开合小刀
      - 开合小刀
      - 仿真枪
      - 手枪模型
      - 模型枪
      - 处方药
      - RX
      - Rx
      - rx
      - 烟草
      - 雪茄
      - CIGAR
      - cigar
      - 工具卡
      - 卡片刀
      - 开刃
      - 防身
    regex: []
    exclude_keywords:
      - 儿童安全剪刀
      - 安全剪刀
      - 桌游战术
      - 战术卡牌
      - 战术地图
      - 厨房开箱工具
      - 厨房开箱体验
      - 官方微信
      - 微信读书
      - 微信支付
      - 企业微信
    exclude_regex: []

  counterfeit_brand:
    description: 假货、仿品和侵权表达。
    keywords:
      - 高仿
      - A货
      - 原单
      - 复刻
      - 仿牌
      - 仿奢
      - 仿品牌
      - 同款
      - 大牌平替
      - 一比一
      - 顶级版本
      - 高版本
      - "1:1"
      - 1比1
      - 专柜品质
    regex: []
    exclude_keywords:
      - 非品牌仿款
    exclude_regex:
      - "非.{0,8}(同款|仿款|品牌)"
      - "(男女|女男|儿童|成人|亲子).{0,4}同款"

  misleading_claim:
    description: 夸大宣传和绝对化用语。
    keywords:
      - 全网最低
      - 永久有效
      - 100%有效
      - 包治
      - 根治
      - 绝对正品
      - 最好
      - 第一
      - 肉眼可见
      - 明显变白
      - 快速瘦
      - 改善睡眠
      - 一次使用
      - 长出新发
      - 抚平
      - 吸出体内湿气
      - 吸出毒素
      - 提升代谢
      - 自动调节身体状态
      - 无需运动
      - 看见围度变化
      - 淡化斑点
      - 淡化斑
    regex:
      - "100\\s*%\\s*(有效|正品|治愈)"
      - "\\d+\\s*(天|日|周|个月).{0,8}(见效|变白|淡化|长出|抚平)"
      - "(提升|提高).{0,6}色阶"
      - "淡化.{0,6}(痘印|斑点|色斑)"
    exclude_keywords: []
    exclude_regex: []
